<h2>April 17, 2005</h2>

<h3>我七年的时光</h3>

<p>紫藤花，留住了多少少年的心事，年复一年。<br />
<img src="http://www.clairehu.com/images/050416/IMG_1944.jpg"></p>

<p>一切依旧。而，物是，人非。<br />
<img src="http://www.clairehu.com/images/050416/IMG_1946.jpg"></p>

<p>勤。俭。敬。信。萦绕了七年的校训，我们一路循来。<br />
<img src="http://www.clairehu.com/images/050416/IMG_1947.jpg"></p>

<p><br />
十四年前相识的少年，就在这里故地重逢。<br />
天平路二百号，早已成为生命中不能忘记的地址。</p>
