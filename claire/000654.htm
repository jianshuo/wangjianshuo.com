<h2>April 15, 2005</h2>

<h3>需要</h3>

<p><i>不是心里深爱的人么？<br />
问问他， 最需要什么。<br />
告诉他， 你最需要什么。</i></p>

<p>一个好朋友今晚在MSN上给我的三句话。</p>

<p>为什么明明是相爱的两个人，会互相争吵，会出言伤人，会在赌气之间，毫不负责任地就伤害了爱。</p>

<p>不爽的时候，想一想对方，这个自己深爱的人。<br />
他最需要什么，我尽我所能地给予了吗？而我要的幸福，坐在一米远的他，又要怎样才能明了？</p>
