                     <h2 class="date-header">April 22, 2007</h2>
                     <a id="a000150"></a>
                     <div class="entry" id="entry-150">
                        <h3 class="entry-header">垃圾食品</h3>
                        <div class="entry-content">
                           <div class="entry-body">
                              <p>宝宝对不起，妈妈今天又吃了垃圾食品了。下了一天的雨，实在很无聊，特别想喝可乐和吃瓜子，就忍不住去超市里买了些。吃完才想起来花生是油炸的，不利于宝宝健康。对不起了，好宝宝。</p>  <p>不知道怎么回事，怀孕后好像特别爱吃汉堡，薯条，可乐和珍珠奶茶。上个月已经超重了，可是为什么还是控制不住呢，老觉得饿。 可怜的宝宝。</p>
