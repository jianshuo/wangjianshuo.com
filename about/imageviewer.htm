<script language="VBScript">
On Error Resume Next

'
'  Display Prev and Next image button
'
strName = Mid(strImageSrc, InStrRev(strImageSrc, "/") + 1)

Set objXML = CreateObject("Microsoft.XMLDOM")
objXML.async = False
result = objXML.Load("photos.xml")
Set objNodes = objXML.selectNodes("//Photo[Name = '" & strName & "']")
strArticle = ""

If objNodes.Length > 0 Then

    strTitle = objNodes(0).selectSingleNode("Title").text
	strArticle = objNodes(0).selectSingleNode("Article").text
	
	Set objPrev = objNodes(0).nextSibling
	Set objNext = objNodes(0).previousSibling
		
	Err.Clear
	idPrevA.href = "ImageViewer.htm?../" & objPrev.selectSingleNode("RelURL").text
	idPrevA.title = objPrev.selectSingleNode("Title").text
	If Err.Number = 0 Then idPrev.innerText = "PREVIOUS"
	
	Err.Clear
	idNextA.href = "ImageViewer.htm?../" & objNext.selectSingleNode("RelURL").text
	idNextA.title = objNext.selectSingleNode("Title").text
	If Err.Number = 0 Then idNext.innerText= "NEXT"
	
End If

'
'   Set the title and page title
'

On Error Resume Next

idTitle.innerHTML = strTitle
idImage.Title = strTitle
If strArticle <> "" Then
	idTitle.innerHTML = "<a href='../" + strArticle + "'>" + strTitle + "</a>"
End If

document.title = document.title + " : " + strTitle

'Next slides every n second
setTimeOut "idNext.click()", 8000
</script>
